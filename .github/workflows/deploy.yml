name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    uses: GetDigitalOS/.github/.github/workflows/deploy-cloudflare-workers.yml@main
    with:
      build-command: "npx opennextjs-cloudflare build"
      package-manager: "npm"
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
